name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test (with coverage)
        id: tests
        continue-on-error: true
        run: pnpm run test:coverage

      - name: Locate JUnit report
        id: junit
        if: ${{ always() }}
        run: |
          if [ -f functions/coverage/junit.xml ]; then
            echo "file=functions/coverage/junit.xml" >> "$GITHUB_OUTPUT"
          else
            echo "Expected JUnit report was not found."
            find . -path '*coverage/junit.xml' -print || true
          fi

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && hashFiles('functions/coverage/lcov.info') != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: functions/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && steps.junit.outputs.file != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: ${{ steps.junit.outputs.file }}
          report_type: test_results

      - name: Fail if tests failed
        if: ${{ steps.tests.outcome == 'failure' }}
        run: exit 1
