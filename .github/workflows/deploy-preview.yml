# Deploys the App Hosting preview backend for each PR.
# Automatic Firebase GitHub rollouts should be OFF for this backend if you rely on this workflow.
#
# Requires: FIREBASE_SERVICE_ACCOUNT_PERSONAL_STATS_CHRISVOGT secret.
# Backend ID must match firebase.json (chronogrove-console-pr).
name: Deploy to Preview Channel

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  verify:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck (strict core)
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build (validate workspace)
        run: pnpm run build

  deploy_preview:
    name: Deploy App Hosting (preview)
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "pnpm"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PERSONAL_STATS_CHRISVOGT }}

      - name: Deploy App Hosting (chronogrove-console-pr)
        run: npx --yes firebase-tools@latest deploy --only apphosting:chronogrove-console-pr --project personal-stats-chrisvogt --non-interactive

      - name: Find preview comment
        uses: peter-evans/find-comment@v3
        id: find-preview-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: App Hosting preview

      - name: Post or update preview URL
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-preview-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            **App Hosting preview** (backend `chronogrove-console-pr`): https://chronogrove-console-pr--personal-stats-chrisvogt.us-central1.hosted.app
