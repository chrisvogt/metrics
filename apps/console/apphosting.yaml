# Firebase App Hosting — root is `apps/console/` (see firebase.json apphosting.rootDir).
# Backend IDs must match backends created in the Firebase console / CLI (e.g. apphosting:backends:create --backend chronogrove-console).

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 1
  concurrency: 20

env:
  - variable: NEXT_PUBLIC_CLOUD_FUNCTIONS_APP_ORIGIN
    value: https://us-central1-personal-stats-chrisvogt.cloudfunctions.net/app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_TENANT_DISPLAY_HOST
    value: www.chrisvogt.me
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ONBOARDING_CNAME_TARGET
    value: personal-stats-chrisvogt.web.app
    availability:
      - BUILD
      - RUNTIME
  # Hostname → public username slug for `src/proxy.ts`: `/` rewrites to `/u/{slug}` (browser URL stays `/`).
  # Comma-separated `host=slug` if you add more tenant API domains later.
  - variable: NEXT_PUBLIC_TENANT_API_ROOT_TO_USERNAME
    value: api.chrisvogt.me=chrisvogt
    availability:
      - BUILD
      - RUNTIME
  # Firestore `tenant_hosts` after env map (see functions `ENABLE_FIRESTORE_TENANT_ROUTING`). Default off.
  - variable: ENABLE_FIRESTORE_TENANT_ROUTING
    value: "false"
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_ENABLE_FIRESTORE_TENANT_ROUTING
    value: "false"
    availability:
      - BUILD
      - RUNTIME
